<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B2FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="spatialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="500" height="500" fill="url(#mainGradient)" rx="40"/>
  
  <!-- 3D空间网格效果 -->
  <g opacity="0.15">
    <line x1="50" y1="150" x2="450" y2="150" stroke="#00D4FF" stroke-width="1"/>
    <line x1="50" y1="250" x2="450" y2="250" stroke="#00D4FF" stroke-width="1"/>
    <line x1="50" y1="350" x2="450" y2="350" stroke="#00D4FF" stroke-width="1"/>
    <line x1="150" y1="50" x2="150" y2="450" stroke="#00D4FF" stroke-width="1"/>
    <line x1="250" y1="50" x2="250" y2="450" stroke="#00D4FF" stroke-width="1"/>
    <line x1="350" y1="50" x2="350" y2="450" stroke="#00D4FF" stroke-width="1"/>
  </g>
  
  <!-- 主图形：抽象的M + 3D空间立方体/ Gaussian Splatting 概念 -->
  <g transform="translate(250, 250)" filter="url(#glow)">
    <!-- 外圈环 -->
    <ellipse cx="0" cy="0" rx="140" ry="60" fill="none" stroke="url(#accentGradient)" stroke-width="3" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="140" ry="60" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5" transform="rotate(-15)"/>
    
    <!-- 3D Gaussian Splatting 粒子点云效果 -->
    <g>
      <circle cx="-60" cy="-30" r="12" fill="#00D4FF" opacity="0.9"/>
      <circle cx="-30" cy="-50" r="8" fill="#7B2FFF" opacity="0.8"/>
      <circle cx="0" cy="-40" r="15" fill="#00D4FF" opacity="0.85"/>
      <circle cx="30" cy="-55" r="10" fill="#7B2FFF" opacity="0.75"/>
      <circle cx="60" cy="-35" r="12" fill="#00D4FF" opacity="0.9"/>
      
      <circle cx="-45" cy="0" r="10" fill="#7B2FFF" opacity="0.7"/>
      <circle cx="-15" cy="10" r="14" fill="#00D4FF" opacity="0.85"/>
      <circle cx="15" cy="5" r="9" fill="#7B2FFF" opacity="0.8"/>
      <circle cx="50" cy="0" r="11" fill="#00D4FF" opacity="0.9"/>
      
      <circle cx="-30" cy="35" r="9" fill="#7B2FFF" opacity="0.75"/>
      <circle cx="0" cy="45" r="13" fill="#00D4FF" opacity="0.85"/>
      <circle cx="35" cy="30" r="8" fill="#7B2FFF" opacity="0.7"/>
    </g>
    
    <!-- 空间连接线 -->
    <g stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6">
      <line x1="-60" y1="-30" x2="-30" y2="-50"/>
      <line x1="-30" y1="-50" x2="0" y2="-40"/>
      <line x1="0" y1="-40" x2="30" y2="-55"/>
      <line x1="30" y1="-55" x2="60" y2="-35"/>
      
      <line x1="-45" y1="0" x2="-15" y2="10"/>
      <line x1="-15" y1="10" x2="15" y2="5"/>
      <line x1="15" y1="5" x2="50" y2="0"/>
      
      <line x1="-30" y1="35" x2="0" y2="45"/>
      <line x1="0" y1="45" x2="35" y2="30"/>
    </g>
  </g>
  
  <!-- MetaST 文字 -->
  <g transform="translate(250, 400)" filter="url(#softGlow)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', sans-serif" font-size="52" font-weight="700" fill="url(#accentGradient)">MetaST</text>
  </g>
  
  <!-- 底部空间智能标语 -->
  <text x="250" y="450" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', sans-serif" font-size="14" fill="#00D4FF" opacity="0.7" letter-spacing="4">SPATIAL INTELLIGENCE</text>
</svg>