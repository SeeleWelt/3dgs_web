<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="50" viewBox="0 0 120 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B2FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 3D层渐变 - 深层 -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 强发光 -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 3D效果 - 后层投影 -->
  <g transform="translate(62, 32)" filter="url(#glow)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="800" fill="#0a1628" opacity="0.5">MetaST</text>
  </g>
  <g transform="translate(61, 31)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="800" fill="#0d1f3c">MetaST</text>
  </g>
  <g transform="translate(60.5, 30.5)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="800" fill="#1a3a5c">MetaST</text>
  </g>
  <g transform="translate(60, 30)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="800" fill="#255070">MetaST</text>
  </g>
  
  <!-- 3D效果 - 中间层 -->
  <g transform="translate(59, 29)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="700" fill="#2d5a80">MetaST</text>
  </g>
  
  <!-- 3D效果 - 表面层 -->
  <g filter="url(#strongGlow)">
    <text x="60" y="30" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="700" fill="url(#textGradient)">MetaST</text>
  </g>
  
  <!-- 高光效果 -->
  <g opacity="0.3">
    <text x="60" y="28" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">MetaST</text>
  </g>
</svg>